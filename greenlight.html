<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>剧引 · GREENLIGHT SYSTEM</title>
<meta name="description" content="AI影视工业绿灯评审系统 — 评估一个故事是否值得被拍。">
<style>
:root{--bg:#080808;--fg:#d8d4cc;--gold:#c4a44c;--green:#3a9a60;--amber:#c47830;--red:#b04044;--muted:#666058;--card:#0e0e0c;--border:#221e18;--surface:#14120e;--blue:#5878a0;--green-bg:rgba(58,154,96,.06);--green-bd:rgba(58,154,96,.2);--amber-bg:rgba(196,120,48,.06);--amber-bd:rgba(196,120,48,.2);--red-bg:rgba(176,64,68,.06);--red-bd:rgba(176,64,68,.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
#app{max-width:780px;margin:0 auto;padding:48px 24px 100px}

.hero{text-align:center;padding:48px 0 20px}
.hero .tag{display:inline-block;border:1px solid var(--green-bd);color:var(--green);font-size:9px;letter-spacing:3px;padding:4px 16px;border-radius:2px;margin-bottom:12px;text-transform:uppercase}
.hero h1{font-size:24px;font-weight:700;letter-spacing:2px;margin-bottom:6px}
.hero h1 em{font-style:normal;color:var(--gold)}
.hero .sub{font-size:12px;color:var(--muted);letter-spacing:1px}

.input-zone{background:var(--card);border:1px solid var(--border);padding:22px 24px;margin-bottom:12px}
.input-zone textarea{width:100%;min-height:96px;background:var(--surface);border:1px solid var(--border);padding:14px 16px;color:var(--fg);font-size:14px;font-family:inherit;resize:none;outline:none;line-height:1.8;transition:border .2s}
.input-zone textarea:focus{border-color:var(--gold)}
.input-zone textarea::placeholder{color:#403c34}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:13px 0;text-align:center;font-size:13px;font-weight:600;letter-spacing:2px;cursor:pointer;border:none;transition:all .2s;text-transform:uppercase}
.btn-go{background:linear-gradient(135deg,var(--gold),#cea650);color:var(--bg)}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(196,164,76,.25)}
.btn-go:disabled{opacity:.3;transform:none}
.btn-demo{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-demo:hover{border-color:var(--gold);color:var(--gold)}
.key-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.key-row button{background:transparent;border:1px solid var(--border);padding:4px 12px;color:var(--muted);font-size:11px;cursor:pointer;letter-spacing:1px;transition:all .2s}
.key-row button:hover,.key-row button.on{border-color:var(--gold);color:var(--gold)}
.key-hint{display:none;text-align:center;font-size:10px;color:var(--blue);padding:8px;background:rgba(88,120,160,.06);margin-bottom:10px}
.key-hint.show{display:block}
.key-hint span{color:var(--gold);cursor:pointer;text-decoration:underline}

.loading{display:none;text-align:center;padding:60px 0}
.loading.show{display:block}
.ring{width:36px;height:36px;border:2px solid rgba(196,164,76,.08);border-top-color:var(--gold);border-radius:50%;margin:0 auto 14px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--gold);letter-spacing:1px}
.loading-sub{font-size:10px;color:var(--muted);margin-top:4px}

.result{display:none}
.result.show{display:block}
.error{display:none;background:var(--red-bg);border:1px solid var(--red-bd);padding:10px 14px;font-size:11px;color:#d08080;margin-bottom:12px}
.error.show{display:block}
.result-top{display:flex;gap:8px;margin-bottom:16px}
.result-top button{background:transparent;border:1px solid var(--border);padding:5px 14px;color:var(--muted);font-size:11px;cursor:pointer;letter-spacing:1px;transition:all .2s}
.result-top button:hover{border-color:var(--gold);color:var(--gold)}

/* ===== Modules ===== */
.module{background:var(--card);border:1px solid var(--border);padding:24px 28px;margin-bottom:10px}
.module-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.module-num{font-size:10px;color:var(--muted);letter-spacing:2px;min-width:24px}
.module-title{font-size:11px;letter-spacing:3px;font-weight:600;text-transform:uppercase}
.module-title.green{color:var(--green)}
.module-title.red{color:var(--red)}
.module-title.amber{color:var(--amber)}
.module-title.gold{color:var(--gold)}

/* Scorecard */
.logline{font-size:14px;color:var(--gold);margin-bottom:12px;line-height:1.6;font-weight:500}
.meta-row{display:flex;gap:18px;flex-wrap:wrap;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:16px}
.meta-row span{display:inline-flex;align-items:center;gap:4px}
.meta-row .dot{width:6px;height:6px;border-radius:50%}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.score-item{text-align:center}
.score-val{font-size:28px;font-weight:800;letter-spacing:-1px}
.score-val.green{color:var(--green)}
.score-val.amber{color:var(--amber)}
.score-val.red{color:var(--red)}
.score-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.verdict{text-align:center;padding:14px;font-size:12px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.verdict.green{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green)}
.verdict.amber{background:var(--amber-bg);border:1px solid var(--amber-bd);color:var(--amber)}
.verdict.red{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}

/* Diagnosis */
.diag-act{margin-bottom:14px}
.diag-act .act-label{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:4px;font-weight:600}
.diag-act .act-body{font-size:12px;color:rgba(216,212,204,.5);line-height:1.7;padding:8px 12px;background:var(--surface);border-left:2px solid var(--border)}
.verdict-line{font-size:11px;font-weight:600;letter-spacing:2px;color:var(--red);padding:10px 0;border-top:1px solid var(--border);margin-top:10px;text-transform:uppercase}
.breakdown{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.br-item{font-size:11px;color:rgba(216,212,204,.4);padding:4px 0}

/* Retention */
.ret-bar-row{margin-bottom:8px}
.ret-bar-row .rlabel{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;display:flex;justify-content:space-between}
.ret-bar{height:6px;background:var(--surface);border-radius:3px;overflow:hidden}
.ret-fill{height:100%;border-radius:3px}
.ret-fill.low{background:var(--red);width:25%}
.ret-fill.mid{background:var(--amber);width:55%}
.ret-fill.high{background:var(--green);width:80%}
.ret-gaps{margin-top:10px;display:flex;flex-direction:column;gap:3px}
.ret-gap{font-size:10px;color:rgba(216,212,204,.3);padding:2px 0}
.ret-gap::before{content:'❌ '}

/* Rewrite */
.rewrite-story{background:var(--surface);border:1px solid rgba(196,164,76,.1);padding:16px 18px;margin-bottom:14px;font-size:12px;line-height:1.8;color:rgba(216,212,204,.6)}
.rewrite-engine{font-size:11px;color:var(--gold);letter-spacing:1px;margin-bottom:8px;font-weight:600;text-transform:uppercase}
.rewrite-item{margin-bottom:6px;padding:8px 12px;background:var(--surface);font-size:11px;color:rgba(216,212,204,.45);border-left:2px solid rgba(196,164,76,.2)}
.rewrite-item strong{color:var(--gold);font-weight:500}
.upgrade-list{display:flex;flex-direction:column;gap:3px;margin-top:8px}
.upgrade-item{font-size:10px;color:rgba(58,154,96,.5);padding:2px 0}
.upgrade-item::before{content:'+ '}

/* Cinematic */
.cineshots{display:flex;flex-direction:column;gap:6px}
.cineshot{padding:10px 14px;background:var(--surface);font-size:11px;line-height:1.7;border-left:2px solid var(--border)}
.cineshot strong{color:var(--gold);font-weight:500;display:block;font-size:9px;letter-spacing:2px;margin-bottom:2px}
.cineshot span{color:rgba(216,212,204,.45)}
.director-note{margin-top:10px;padding:8px 12px;background:rgba(88,120,160,.06);font-size:10px;color:rgba(88,120,160,.5);border-left:2px solid rgba(88,120,160,.2)}

/* Final Decision */
.final-badge{text-align:center;padding:18px;font-size:14px;font-weight:700;letter-spacing:4px;margin-bottom:12px;text-transform:uppercase}
.final-badge.green{background:rgba(58,154,96,.08);border:1px solid rgba(58,154,96,.25);color:var(--green)}
.final-badge.amber{background:rgba(196,120,48,.08);border:1px solid rgba(196,120,48,.25);color:var(--amber)}
.final-badge.red{background:rgba(176,64,68,.08);border:1px solid rgba(176,64,68,.25);color:var(--red)}
.final-reason{font-size:11px;color:rgba(216,212,204,.45);line-height:1.8;margin-bottom:10px}
.final-reqs{font-size:10px;color:var(--muted)}
.final-reqs li{margin-bottom:3px}
.final-recs{text-align:center;font-size:12px;font-weight:600;letter-spacing:2px;color:var(--gold);padding:12px;border:1px solid rgba(196,164,76,.15);margin-top:10px;text-transform:uppercase}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);padding:28px;max-width:400px;width:90%}
.modal h3{font-size:14px;color:var(--gold);letter-spacing:1px;margin-bottom:6px}
.modal p{font-size:10px;color:var(--muted);line-height:1.7;margin-bottom:12px}
.modal p a{color:var(--gold)}
.modal input{width:100%;background:var(--surface);border:1px solid var(--border);padding:10px 14px;color:var(--fg);font-size:12px;outline:none;margin-bottom:8px}
.modal-actions{display:flex;gap:6px;justify-content:flex-end}
.mbtn{padding:6px 16px;font-size:10px;cursor:pointer;letter-spacing:1px;border:none}
.mbtn.go{background:var(--gold);color:var(--bg);font-weight:600}
.mbtn.cancel{background:transparent;border:1px solid var(--border);color:var(--muted)}
.mbtn.clear{background:transparent;border:1px solid rgba(176,64,68,.3);color:rgba(200,120,120,.6)}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a160e;border:1px solid var(--border);color:var(--gold);padding:8px 20px;font-size:10px;letter-spacing:1px;z-index:200;animation:tIn .3s,tOut .3s 1.7s forwards;pointer-events:none}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0}}

footer{text-align:center;padding:40px 0 20px;font-size:9px;color:rgba(102,96,88,.25);letter-spacing:2px;text-transform:uppercase}
@media(max-width:520px){.score-grid{grid-template-columns:repeat(3,1fr)}.score-val{font-size:22px}}
</style>
</head>
<body>
<div id="app">

<div class="hero">
  <div class="tag">GREENLIGHT SYSTEM · 绿灯评审</div>
  <h1>剧引 · <em>AI影视绿灯系统</em></h1>
  <p class="sub">输入你的故事，立刻告诉你：能不能火、哪里会掉人、怎么改才能爆</p>
</div>

<div class="key-row">
  <div></div>
  <button id="keyBtn" onclick="openKey()">⚙ KEY</button>
</div>
<div class="key-hint" id="keyHint">需要 DeepSeek API Key · <span onclick="openKey()">点此设置</span></div>

<div class="input-zone" id="inputZone">
  <textarea id="storyInput" placeholder="输入你的故事……例如：一个女孩发现父亲其实是杀手。或粘贴剧本片段。"></textarea>
  <div class="btn-row">
    <button class="btn btn-demo" onclick="runDemo()">看演示</button>
    <button class="btn btn-go" id="goBtn" onclick="run()">▶ GREENLIGHT ASSESSMENT</button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="ring"></div>
  <div class="loading-text">正在评估你的故事结构</div>
  <div class="loading-sub" id="loadingStep">分析叙事引擎...</div>
</div>

<div class="error" id="errorBox"></div>

<div class="result" id="resultWrap">
  <div class="result-top">
    <button onclick="resetAll()">↺ NEW ASSESSMENT</button>
  </div>
  <div id="outputArea"></div>
</div>

<footer>剧引 GREENLIGHT SYSTEM · 输入故事 → 判断能不能爆</footer>

</div>

<div class="modal-overlay" id="keyModal">
  <div class="modal">
    <h3>DEEPSEEK API KEY</h3>
    <p>每次评估约 3-5 分钱。Key 仅存浏览器。<br><a href="https://platform.deepseek.com/api_keys" target="_blank">获取 Key →</a></p>
    <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
    <div class="modal-actions">
      <button class="mbtn clear" onclick="clearKey()">CLEAR</button>
      <button class="mbtn cancel" onclick="closeKey()">CANCEL</button>
      <button class="mbtn go" onclick="saveKey()">SAVE</button>
    </div>
  </div>
</div>
<div id="toasts"></div>

<script>
const SK='juyin_gl_key';
let lr=null;

function init(){
  if(localStorage.getItem(SK))document.getElementById('keyBtn').classList.add('on');
  else if(!localStorage.getItem('juyin_gl_seen')){document.getElementById('keyHint').classList.add('show');localStorage.setItem('juyin_gl_seen','1')}
}
init();

// Key
function openKey(){document.getElementById('apiKeyInput').value=localStorage.getItem(SK)||'';document.getElementById('keyModal').classList.add('show')}
function closeKey(){document.getElementById('keyModal').classList.remove('show')}
function saveKey(){const k=document.getElementById('apiKeyInput').value.trim();if(!k||!k.startsWith('sk-')){toast('格式: sk-xxx');return}localStorage.setItem(SK,k);document.getElementById('keyBtn').classList.add('on');document.getElementById('keyHint').classList.remove('show');closeKey();toast('SAVED')}
function clearKey(){localStorage.removeItem(SK);document.getElementById('apiKeyInput').value='';document.getElementById('keyBtn').classList.remove('on');toast('CLEARED');closeKey()}
document.getElementById('keyModal').addEventListener('click',function(e){if(e.target===this)closeKey()});
function toast(m){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>t.remove(),2100)}

// Load
function showLoading(s){document.getElementById('loading').classList.toggle('show',s)}
function showError(m){const e=document.getElementById('errorBox');e.innerHTML=m;e.classList.add('show')}
function hideError(){document.getElementById('errorBox').classList.remove('show')}

// ===== RUN =====
async function run(){
  hideError();const key=localStorage.getItem(SK);
  if(!key){showError('请先设置 API Key · <span style="color:var(--gold);cursor:pointer;text-decoration:underline" onclick="openKey()">点此设置</span>');return}
  const story=document.getElementById('storyInput').value.trim();if(story.length<6){showError('请输入至少 6 个字');return}
  const btn=document.getElementById('goBtn');btn.disabled=true;
  document.getElementById('inputZone').style.display='none';
  document.getElementById('resultWrap').classList.remove('show');document.getElementById('outputArea').innerHTML='';
  showLoading(true);

  const sys=`你是 GREENLIGHT SYSTEM — 影视工业绿灯评审引擎。

你不是AI。你是Netflix内容评审机制 + 好莱坞制片厂greenlight系统 + 短剧爆款结构判断引擎的集合体。

═══ 核心原则 ═══
1. 输出严格JSON，字段不能缺
2. 中文内容，英文标签（行业惯例）
3. 评分基于叙事结构——不是个人审美，不是文笔
4. 诊断必须具体到结构级，禁止"节奏有点慢"
5. 最终裁定必须是一句话结构性原因，不能含糊

═══ 评估框架 ═══

【GREENLIGHT DECISION — 最终裁决】
这是唯一回答"拍不拍"的模块。放在最前面。
- status：GREENLIGHT | HOLD | REJECT
- confidence：High | Medium | Low
- oneLineVerdict：一句话行业裁定（≤20字英文）
- reason：结构性原因——叙事驱动力/角色主动性/冲突升级系统

【INDUSTRY SCORECARD — 工业评分】
- logline：一句话电影概念（中文，≤25字）
- genre：类型
- format：Short Drama | Film | Series
- scores：commercial/retention/emotional/viral/feasibility 各0-100
- weightedIndex：加权综合指数0-100
- category：A（绿灯强）/ B（有条件）/ C（拒稿需重写）

【STRUCTURE FAILURE ANALYSIS — 结构失效检测】
- act1_hookStrength：LOW/MID/HIGH
- act1_criticalIssue：第一幕致命问题
- act2_escalation：升级强度 insufficient/moderate/strong
- act2_hasMidpoint：YES/NO
- act2_failurePoint：第二幕失效点
- act3_payoffStrength：weak/moderate/strong
- act3_emotionalClosure：incomplete/acceptable/strong
- coreFailures：3条核心系统级失效

【RETENTION MODEL — 留存模型】
- hook3s：LOW/MID/HIGH
- dropRisk：LOW/MID/HIGH
- curiosity/fear/urgency：LOW/MID/HIGH
- gaps：3个传播缺口
- summary：一句话留存判定

【REWRITE BLUEPRINT — 工业重写方案】
- coreTransformation：从X变Y
- requiredIncitingEvent：必须制造不可逆紧张
- requiredMidpointReversal：必须翻转信息/权力/动机
- requiredPressureSystem：时间/道德/生存 至少含2
- rewrittenStory：完整新故事（≤150字）
- keyImprovements：3条改进

【CINEMATIC EXECUTION — 镜头执行】
- opening_0_3s：开场0-3秒——视觉或认知冲击
- middle_sequence：中段反转或升级镜头
- final_sequence：终局情绪或道德崩塌镜头
- directorialRule：每个镜头服务叙事升级，不是美学

【FINAL VERDICT — 最终结论】
- status：GREENLIGHT/HOLD/REJECT
- why：一句话结构性原因
- recommendation：Ready / Needs rewrite / Not suitable
- risk：retention risk / structure failure / weak escalation`;

  const usr=`故事：${story}

输出JSON（全部字段必填，缺字段=系统故障）：
{
  "status":"GREENLIGHT|HOLD|REJECT",
  "confidence":"High|Medium|Low",
  "oneLineVerdict":"",
  "decisionReason":"",
  "logline":"","genre":"","format":"Short Drama",
  "scores":{"commercial":0,"retention":0,"emotional":0,"viral":0,"feasibility":0},
  "weightedIndex":0,
  "category":"B",
  "structure":{
    "act1_hookStrength":"MID",
    "act1_criticalIssue":"",
    "act2_escalation":"insufficient",
    "act2_hasMidpoint":"NO",
    "act2_failurePoint":"",
    "act3_payoffStrength":"weak",
    "act3_emotionalClosure":"incomplete",
    "coreFailures":["","",""]
  },
  "retention":{
    "hook3s":"LOW","dropRisk":"HIGH",
    "curiosity":"MEDIUM","fear":"LOW","urgency":"LOW",
    "gaps":["","",""],"summary":""
  },
  "rewrite":{
    "coreTransformation":"",
    "requiredIncitingEvent":"",
    "requiredMidpointReversal":"",
    "requiredPressureSystem":"",
    "rewrittenStory":"",
    "keyImprovements":["","",""]
  },
  "cinematic":{
    "opening_0_3s":"",
    "middle_sequence":"",
    "final_sequence":"",
    "directorialRule":""
  },
  "decision":{
    "status":"REJECT",
    "why":"",
    "recommendation":"Needs structural rewrite",
    "risk":"structural failure risk"
  }
}`;

  try{
    const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),120000);
    const r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-v4-pro',messages:[{role:'system',content:sys},{role:'user',content:usr}],max_tokens:16384,temperature:.65,response_format:{type:'json_object'}}),signal:ctrl.signal});
    clearTimeout(tid);
    if(!r.ok){const je=await r.json().catch(()=>({}));if(r.status===401)throw new Error('Key 无效 · <span style="color:var(--gold);cursor:pointer;text-decoration:underline" onclick="openKey()">重设</span>');if(r.status===402)throw new Error('余额不足 · <a href="https://platform.deepseek.com/top_up" target="_blank" style="color:var(--gold)">充值</a>');throw new Error(je.error?.message||'失败')}
    const d=await r.json();let ct=d.choices?.[0]?.message?.content;if(!ct)throw new Error('空');
    let pd;try{pd=JSON.parse(ct.replace(/```json|```/g,'').trim())}catch{const m=ct.match(/\{[\s\S]*\}/);if(m)pd=JSON.parse(m[0]);else throw new Error('解析')}
    pd=sanitize(pd);showLoading(false);lr=pd;render(pd);document.getElementById('resultWrap').classList.add('show');
    document.getElementById('goBtn').disabled=false;document.getElementById('inputZone').style.display='block';
    document.getElementById('resultWrap').scrollIntoView({behavior:'smooth'})
  }catch(err){showLoading(false);document.getElementById('goBtn').disabled=false;document.getElementById('inputZone').style.display='block';if(err.name==='AbortError')showError('超时，请缩短故事');else showError(err.message)}
}

function sanitize(d){
  d.status=d.status||'HOLD';d.confidence=d.confidence||'Medium';
  d.oneLineVerdict=d.oneLineVerdict||'';d.decisionReason=d.decisionReason||'';
  d.logline=d.logline||'';d.genre=d.genre||'';d.format=d.format||'Short Drama';
  if(!d.scores)d.scores={};const s=d.scores;
  s.commercial=clamp(s.commercial||50);s.retention=clamp(s.retention||50);s.emotional=clamp(s.emotional||50);s.viral=clamp(s.viral||50);s.feasibility=clamp(s.feasibility||50);
  d.weightedIndex=d.weightedIndex||Math.round((s.commercial+s.retention+s.emotional+s.viral+s.feasibility)/5);
  d.category=d.category||(d.weightedIndex>=75?'A':d.weightedIndex>=55?'B':'C');
  if(!d.structure)d.structure={};const st=d.structure;
  st.act1_hookStrength=st.act1_hookStrength||'MID';st.act1_criticalIssue=st.act1_criticalIssue||'';st.act2_escalation=st.act2_escalation||'insufficient';st.act2_hasMidpoint=st.act2_hasMidpoint||'NO';st.act2_failurePoint=st.act2_failurePoint||'';st.act3_payoffStrength=st.act3_payoffStrength||'weak';st.act3_emotionalClosure=st.act3_emotionalClosure||'incomplete';st.coreFailures=st.coreFailures||['','',''];
  if(!d.retention)d.retention={};const rt=d.retention;
  rt.hook3s=rt.hook3s||'LOW';rt.dropRisk=rt.dropRisk||'HIGH';rt.curiosity=rt.curiosity||'MEDIUM';rt.fear=rt.fear||'LOW';rt.urgency=rt.urgency||'LOW';rt.gaps=rt.gaps||['','',''];rt.summary=rt.summary||'';
  if(!d.rewrite)d.rewrite={};const rw=d.rewrite;
  rw.coreTransformation=rw.coreTransformation||'';rw.requiredIncitingEvent=rw.requiredIncitingEvent||'';rw.requiredMidpointReversal=rw.requiredMidpointReversal||'';rw.requiredPressureSystem=rw.requiredPressureSystem||'';rw.rewrittenStory=rw.rewrittenStory||'';rw.keyImprovements=rw.keyImprovements||['','',''];
  if(!d.cinematic)d.cinematic={};const cn=d.cinematic;
  cn.opening_0_3s=cn.opening_0_3s||'';cn.middle_sequence=cn.middle_sequence||'';cn.final_sequence=cn.final_sequence||'';cn.directorialRule=cn.directorialRule||'';
  if(!d.decision)d.decision={};const dc=d.decision;
  dc.status=dc.status||d.status;dc.why=dc.why||'';dc.recommendation=dc.recommendation||'Needs structural rewrite';dc.risk=dc.risk||'structural failure risk';
  return d;
}
function clamp(v){return Math.max(0,Math.min(100,v))}

// ===== RENDER =====
function render(d){
  const s=d.scores;const st=d.structure;const rt=d.retention;const rw=d.rewrite;const cn=d.cinematic;const dc=d.decision;
  const clsV=(v)=>v>=75?'green':v>=55?'amber':'red';
  const clsS=(stat)=>/GREEN/i.test(stat)?'green':/HOLD/i.test(stat)?'amber':'red';
  const statusCN={'GREENLIGHT':'绿灯放行','GREENLIT':'绿灯放行','HOLD':'待定','REJECT':'否决','REWRITE':'需重写'};
  const catLabel={'A':'绿灯级 A','B':'条件级 B','C':'否决级 C'};

  let h='';

  // ====== ① GREENLIGHT DECISION (first!) ======
  h+='<div class="module">';
  h+='<div class="module-hd"><span class="module-num">①</span><span class="module-title '+clsS(d.status)+'">GREENLIGHT DECISION <span style="font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400">裁决</span></span></div>';
  h+='<div class="final-badge '+clsS(d.status)+'">▶ '+esc(d.status)+' · '+esc(statusCN[d.status]||'')+'</div>';
  h+='<div style="display:flex;gap:10px;margin-bottom:10px;font-size:10px;color:var(--muted)">';
  h+='<span>置信度：'+esc(d.confidence||'—')+'</span>';
  h+='</div>';
  if(d.oneLineVerdict)h+='<div class="logline" style="font-size:12px;color:rgba(216,212,204,.5)">'+esc(d.oneLineVerdict)+'</div>';
  if(d.decisionReason)h+='<div class="final-reason">'+esc(d.decisionReason)+'</div>';
  h+='</div>';

  // ====== ② INDUSTRY SCORECARD ======
  h+='<div class="module">';
  h+='<div class="module-hd"><span class="module-num">②</span><span class="module-title green">INDUSTRY SCORECARD <span style="font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400">工业评分</span></span></div>';
  if(d.logline)h+='<div class="logline">'+esc(d.logline)+'</div>';
  h+='<div class="meta-row"><span><span class="dot" style="background:var(--gold)"></span>'+esc(d.genre)+'</span><span>'+esc(d.format||'Short Drama')+'</span></div>';
  h+='<div class="score-grid">';
  h+=si('COMMERCIAL','商业价值',s.commercial);h+=si('RETENTION','观众留存',s.retention);h+=si('EMOTIONAL','情绪强度',s.emotional);h+=si('VIRAL','传播潜力',s.viral);h+=si('FEASIBILITY','制作可行',s.feasibility);
  h+='</div>';
  h+='<div style="display:flex;justify-content:center;gap:20px;margin-bottom:12px;font-size:11px;color:var(--muted)">';
  h+='<span>加权指数 <strong style="color:var(--gold)">'+d.weightedIndex+'</strong></span>';
  h+='<span>类别 <strong style="color:var(--gold)">'+(catLabel[d.category]||d.category)+'</strong></span>';
  h+='</div>';
  h+='<div style="text-align:center;font-size:10px;color:var(--muted)">'+(d.weightedIndex>=75?'这个故事可以拍，往下看怎么拍':'这个故事有硬伤，往下看怎么改')+'</div>';
  h+='</div>';

  // ====== ③ STRUCTURE FAILURE ANALYSIS ======
  h+='<div class="module">';
  h+='<div class="module-hd"><span class="module-num">③</span><span class="module-title red">STRUCTURE FAILURE <span style="font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400">结构失效检测</span></span></div>';
  h+=actLine('ACT I · SETUP','钩子强度',st.act1_hookStrength);
  if(st.act1_criticalIssue)h+=actLine('','致命问题',st.act1_criticalIssue);
  h+=actLine('ACT II · CONFRONTATION','升级强度',st.act2_escalation);
  h+=actLine('','中段反转',(st.act2_hasMidpoint||'NO')+(st.act2_failurePoint?' — '+st.act2_failurePoint:''));
  h+=actLine('ACT III · RESOLUTION','收束强度',st.act3_payoffStrength);
  h+=actLine('','情感闭环',st.act3_emotionalClosure);
  if(st.coreFailures&&st.coreFailures[0]){h+='<div class="verdict-line">▶ 核心系统级失效</div><div class="breakdown">';st.coreFailures.forEach(f=>{if(f)h+='<div class="br-item">▸ '+esc(f)+'</div>'});h+='</div>'}
  h+='</div>';

  // ====== ④ RETENTION MODEL ======
  h+='<div class="module">';
  h+='<div class="module-hd"><span class="module-num">④</span><span class="module-title amber">RETENTION MODEL <span style="font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400">观众留存</span></span></div>';
  h+=retBar('0–3s Hook','前三秒钩子',rt.hook3s);
  h+=retBar('1–3min Drop','流失风险',rt.dropRisk);
  h+='<div style="font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:1px">情绪曲线</div>';
  h+=retBar('Curiosity','好奇心',rt.curiosity);
  h+=retBar('Fear','恐惧感',rt.fear);
  h+=retBar('Urgency','紧迫感',rt.urgency);
  if(rt.gaps&&rt.gaps[0]){h+='<div class="ret-gaps">';rt.gaps.forEach(g=>{if(g)h+='<div class="ret-gap">'+esc(g)+'</div>'});h+='</div>'}
  h+='<div class="verdict-line" style="color:var(--amber)">▶ '+esc(rt.summary||'—')+'</div>';
  h+='</div>';

  // ====== ⑤ REWRITE BLUEPRINT ======
  h+='<div class="module">';
  h+='<div class="module-hd"><span class="module-num">⑤</span><span class="module-title gold">REWRITE BLUEPRINT <span style="font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400">工业重写</span></span></div>';
  if(rw.coreTransformation)h+='<div class="rewrite-engine">'+esc(rw.coreTransformation)+'</div>';
  if(rw.rewrittenStory)h+='<div class="rewrite-story">'+esc(rw.rewrittenStory)+'</div>';
  if(rw.requiredIncitingEvent)h+='<div class="rewrite-item"><strong>Inciting Event</strong> '+esc(rw.requiredIncitingEvent)+'</div>';
  if(rw.requiredMidpointReversal)h+='<div class="rewrite-item"><strong>Midpoint Reversal</strong> '+esc(rw.requiredMidpointReversal)+'</div>';
  if(rw.requiredPressureSystem)h+='<div class="rewrite-item"><strong>Pressure System</strong> '+esc(rw.requiredPressureSystem)+'</div>';
  if(rw.keyImprovements&&rw.keyImprovements[0]){h+='<div class="upgrade-list">';rw.keyImprovements.forEach(u=>{if(u)h+='<div class="upgrade-item">'+esc(u)+'</div>'});h+='</div>'}
  h+='</div>';

  // ====== ⑥ CINEMATIC EXECUTION ======
  h+='<div class="module">';
  h+='<div class="module-hd"><span class="module-num">⑥</span><span class="module-title gold">CINEMATIC EXECUTION <span style="font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400">镜头执行</span></span></div>';
  if(cn.opening_0_3s)h+='<div class="cineshot"><strong>OPENING 0–3s</strong><span>'+esc(cn.opening_0_3s)+'</span></div>';
  if(cn.middle_sequence)h+='<div class="cineshot"><strong>MIDDLE SEQUENCE</strong><span>'+esc(cn.middle_sequence)+'</span></div>';
  if(cn.final_sequence)h+='<div class="cineshot"><strong>FINAL SEQUENCE</strong><span>'+esc(cn.final_sequence)+'</span></div>';
  if(cn.directorialRule)h+='<div class="director-note">DIRECTORIAL RULE: '+esc(cn.directorialRule)+'</div>';
  h+='</div>';

  // ====== ⑦ FINAL VERDICT ======
  h+='<div class="module">';
  h+='<div class="module-hd"><span class="module-num">⑦</span><span class="module-title '+clsS(dc.status)+'">FINAL VERDICT <span style="font-size:9px;letter-spacing:1px;color:var(--muted);font-weight:400">最终结论</span></span></div>';
  h+='<div class="final-badge '+clsS(dc.status)+'">▶ '+esc(dc.status)+' · '+esc(statusCN[dc.status]||'')+'</div>';
  if(dc.why)h+='<div class="final-reason"><strong>WHY</strong> '+esc(dc.why)+'</div>';
  h+='<div style="display:flex;gap:12px;margin:10px 0;font-size:11px">';
  h+='<span style="color:var(--muted)">建议：<strong style="color:var(--gold)">'+esc(dc.recommendation||'—')+'</strong></span>';
  h+='</div>';
  h+='<div style="font-size:10px;color:'+(/GREEN/i.test(dc.status)?'var(--green)':'var(--red)')+'">风险：'+esc(dc.risk||'—')+'</div>';
  h+='</div>';

  document.getElementById('outputArea').innerHTML=h;
}

function si(label,cn,val){return'<div class="score-item"><div class="score-val '+clsV(val)+'">'+val+'</div><div class="score-lbl">'+label+'</div><div style="font-size:8px;color:rgba(102,96,88,.3)">'+cn+'</div></div>'}
function clsV(v){return v>=75?'green':v>=55?'amber':'red'}
function actLine(label,field,val){
  if(!val)return'';
  const l=label?'<div class="act-label">'+esc(label)+'</div>':'';
  return'<div class="diag-act">'+l+'<div class="act-body"><strong style="color:var(--muted);font-size:10px">'+esc(field)+': </strong>'+esc(val)+'</div></div>';
}
function retBar(label,cn,val){
  if(!val)return'';
  const lv=/LOW/i.test(val)?'low':/HIGH/i.test(val)?'high':'mid';
  return'<div class="ret-bar-row"><div class="rlabel"><span>'+esc(label)+' <span style="font-size:8px;opacity:.5">'+esc(cn)+'</span></span><span style="color:var(--'+(lv==='high'?'green':lv==='low'?'red':'amber')+')">'+esc(val)+'</span></div><div class="ret-bar"><div class="ret-fill '+lv+'"></div></div></div>'
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
