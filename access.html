<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>剧引 · AI导演系统</title>
<meta name="description" content="输入一个故事，判断它能不能成为爆款。">
<style>
:root{--bg:#0d0d0d;--fg:#e8e4dd;--gold:#c9a050;--muted:#6b6458;--red:#c05350;--green:#50a878;--blue:#6088b8;--card:#141210;--border:#2a2520;--surface:#1a1612}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;line-height:1.6}
#app{max-width:680px;margin:0 auto;padding:40px 24px 80px}

/* Hero */
.hero{text-align:center;padding:40px 0 20px}
.hero h1{font-size:28px;font-weight:700;letter-spacing:2px;margin-bottom:8px}
.hero h1 span{color:var(--gold)}
.hero .sub{font-size:14px;color:var(--muted);margin-bottom:28px}

/* Input */
.input-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:14px}
.input-card textarea{width:100%;min-height:100px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;color:var(--fg);font-size:15px;font-family:inherit;resize:none;outline:none;line-height:1.7;transition:border-color .2s}
.input-card textarea:focus{border-color:var(--gold)}
.input-card textarea::placeholder{color:#4a4438}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:13px 0;border-radius:8px;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all .2s;border:none;text-align:center}
.btn-primary{background:linear-gradient(135deg,var(--gold),#d4a84a);color:var(--bg)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,160,80,.25)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-demo{background:transparent;border:1px solid rgba(96,136,184,.25);color:var(--blue)}
.btn-demo:hover{border-color:rgba(96,136,184,.5);background:rgba(96,136,184,.06)}

/* Settings */
.settings{display:flex;justify-content:flex-end;margin-bottom:10px}
.settings button{background:transparent;border:1px solid var(--border);border-radius:6px;padding:5px 12px;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s}
.settings button:hover,.settings button.active{border-color:var(--gold);color:var(--gold)}
.key-hint{display:none;text-align:center;font-size:11px;color:var(--blue);margin-bottom:12px;padding:8px;background:rgba(96,136,184,.06);border-radius:6px}
.key-hint.show{display:block}
.key-hint a{color:var(--gold);cursor:pointer;text-decoration:underline}

/* Loading */
.loading{display:none;text-align:center;padding:60px 0}
.loading.show{display:block}
.spinner{width:36px;height:36px;border:2px solid rgba(201,160,80,.1);border-top-color:var(--gold);border-radius:50%;margin:0 auto 14px;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--gold)}
.loading-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* Results */
.result{display:none;margin-top:14px}
.result.show{display:block}

/* Error */
.error{display:none;background:rgba(192,80,80,.08);border:1px solid rgba(192,80,80,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:#d08080;margin-bottom:12px;line-height:1.5}
.error.show{display:block}

/* Score module */
.score-module{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:12px}
.score-module h2{font-size:13px;letter-spacing:2px;color:var(--gold);margin-bottom:16px;text-transform:uppercase}
.score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.score-item{text-align:center}
.score-ring{width:72px;height:72px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800}
.score-ring.high{border:3px solid var(--green);color:var(--green);background:rgba(80,168,120,.08)}
.score-ring.mid{border:3px solid var(--gold);color:var(--gold);background:rgba(201,160,80,.08)}
.score-ring.low{border:3px solid var(--red);color:var(--red);background:rgba(192,80,80,.08)}
.score-label{font-size:10px;color:var(--muted);letter-spacing:1px}
.conclusion{text-align:center;padding:12px;border-radius:8px;font-size:13px;font-weight:600;letter-spacing:1px}
.conclusion.yes{background:rgba(80,168,120,.1);color:var(--green);border:1px solid rgba(80,168,120,.2)}
.conclusion.no{background:rgba(192,80,80,.1);color:var(--red);border:1px solid rgba(192,80,80,.2)}
.conclusion.maybe{background:rgba(201,160,80,.1);color:var(--gold);border:1px solid rgba(201,160,80,.2)}

/* Diagnosis module */
.diag-module{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:12px}
.diag-module h2{font-size:13px;letter-spacing:2px;color:var(--red);margin-bottom:14px}
.diag-item{margin-bottom:10px;padding:10px 14px;background:var(--surface);border-radius:8px;border-left:3px solid var(--border)}
.diag-item .diag-tag{font-size:9px;letter-spacing:2px;color:var(--red);margin-bottom:3px;text-transform:uppercase}
.diag-item .diag-text{font-size:12px;color:rgba(232,228,221,.6);line-height:1.7}

/* Fix module */
.fix-module{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px 24px;margin-bottom:12px}
.fix-module h2{font-size:13px;letter-spacing:2px;color:var(--green);margin-bottom:14px}
.fix-story{background:var(--surface);border:1px solid rgba(80,168,120,.15);border-radius:8px;padding:14px 16px;margin-bottom:12px;font-size:13px;line-height:1.8;color:rgba(232,228,221,.7)}
.fix-changes{margin-bottom:10px;font-size:12px;color:var(--muted);line-height:1.8}
.fix-changes strong{color:var(--green)}
.fix-points{display:flex;flex-direction:column;gap:6px}
.fix-point{padding:8px 14px;background:rgba(80,168,120,.06);border-radius:6px;font-size:12px;color:rgba(232,228,221,.55);border-left:2px solid rgba(80,168,120,.3)}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:420px;width:90%}
.modal h3{font-size:15px;color:var(--gold);margin-bottom:8px}
.modal p{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.modal p a{color:var(--gold);text-decoration:underline}
.modal input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--fg);font-size:12px;outline:none;margin-bottom:10px}
.modal-actions{display:flex;gap:6px;justify-content:flex-end}
.modal-btn{padding:7px 18px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .2s}
.modal-btn.primary{background:var(--gold);border:none;color:var(--bg);font-weight:600}
.modal-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--muted)}
.modal-btn.danger{background:transparent;border:1px solid rgba(192,80,80,.3);color:rgba(200,120,120,.7)}

/* History */
.hist-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 12px;color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s;margin-left:auto}
.hist-btn:hover{border-color:var(--gold);color:var(--gold)}
.history-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:12px}
.history-panel.show{display:block}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02);font-size:11px;cursor:pointer}
.history-item:hover{color:var(--gold)}
.history-item .hi-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item .hi-score{font-size:10px;margin:0 8px;color:var(--muted)}
.history-item .hi-del{color:var(--red);padding:2px 6px;cursor:pointer;font-size:10px}

footer{text-align:center;padding:30px 0;font-size:10px;color:rgba(107,100,88,.3);letter-spacing:1px}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#261e10;border:1px solid var(--border);color:var(--gold);padding:8px 20px;border-radius:50px;font-size:11px;letter-spacing:1px;z-index:200;animation:toastIn .3s,toastOut .3s 1.7s forwards;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

@media(max-width:500px){
  .score-row{grid-template-columns:repeat(3,1fr);gap:8px}
  .score-ring{width:56px;height:56px;font-size:18px}
  .hero h1{font-size:22px}
}
</style>
</head>
<body>
<div id="app">

<div class="settings">
  <button id="settingsBtn" onclick="openSettings()">⚙ Key</button>
</div>

<div class="hero">
  <h1>剧引 · <span>AI导演系统</span></h1>
  <p class="sub">输入一个故事，判断它能不能成为爆款</p>
  <div class="key-hint" id="keyHint">⚡ 需要 DeepSeek API Key · <a onclick="openSettings()">点此设置</a></div>
</div>

<div class="input-card" id="inputCard">
  <textarea id="storyInput" placeholder="请输入你的故事，例如：一个女孩发现父亲其实是杀手"></textarea>
  <div class="btn-row">
    <button class="btn btn-demo" onclick="runDemo()">🎬 看演示</button>
    <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">🎯 开始分析</button>
  </div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">导演正在评估你的故事</div>
  <div class="loading-sub" id="loadingStep">分析爆款潜力...</div>
</div>

<div class="error" id="errorBox"></div>

<div class="result" id="resultWrap">
  <div style="display:flex;align-items:center;margin-bottom:14px;gap:8px">
    <button class="btn btn-demo" onclick="resetForm()" style="flex:0;padding:6px 14px;font-size:11px">↺ 重新分析</button>
    <button class="hist-btn" onclick="toggleHistory()">📜 历史</button>
  </div>
  <div class="history-panel" id="historyPanel"><div id="historyList"></div></div>
  <div id="outputArea"></div>
</div>

<footer>剧引 · AI导演系统 V1 · 判断一个故事能不能爆</footer>

</div>

<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h3>⚙ API Key</h3>
    <p>使用 DeepSeek 引擎，一次评估约 1-3 分钱。Key 仅存你的浏览器。<br><a href="https://platform.deepseek.com/api_keys" target="_blank">获取 Key →</a></p>
    <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx">
    <div class="modal-actions">
      <button class="modal-btn danger" onclick="clearKey()">清除</button>
      <button class="modal-btn secondary" onclick="closeSettings()">取消</button>
      <button class="modal-btn primary" onclick="saveKey()">保存</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

<script>
// ===== State =====
const SK = 'juyin_v1_key';
const HK = 'juyin_v1_history';
let lastResult = null;
let preResult = null; // demo pre-baked

// ===== Init =====
function init() {
  const key = localStorage.getItem(SK);
  document.getElementById('settingsBtn').classList.toggle('active', !!key);
  if (!key && !localStorage.getItem('juyin_v1_visited')) {
    document.getElementById('keyHint').classList.add('show');
    localStorage.setItem('juyin_v1_visited', '1');
  }
  updateHistBadge();
}
init();

// ===== Key management =====
function openSettings() {
  document.getElementById('apiKeyInput').value = localStorage.getItem(SK) || '';
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings() { document.getElementById('settingsModal').classList.remove('show'); }
function saveKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (!k || !k.startsWith('sk-')) { toast('格式以 sk- 开头'); return; }
  localStorage.setItem(SK, k);
  document.getElementById('settingsBtn').classList.add('active');
  document.getElementById('keyHint').classList.remove('show');
  closeSettings();
  toast('已保存');
}
function clearKey() {
  localStorage.removeItem(SK);
  document.getElementById('apiKeyInput').value = '';
  document.getElementById('settingsBtn').classList.remove('active');
  toast('已清除');
  closeSettings();
}
document.getElementById('settingsModal').addEventListener('click', function(e) { if (e.target === this) closeSettings(); });

// ===== Toast =====
function toast(m) {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = m;
  c.appendChild(t); setTimeout(() => t.remove(), 2100);
}

// ===== UI helpers =====
function showLoading(show) {
  document.getElementById('loading').classList.toggle('show', show);
}
function showError(msg) {
  const e = document.getElementById('errorBox');
  e.innerHTML = msg; e.classList.add('show');
}
function hideError() { document.getElementById('errorBox').classList.remove('show'); }
function scrollTo(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

// ===== Analyze =====
async function analyze() {
  hideError();
  const key = localStorage.getItem(SK);
  if (!key) { showError('请先设置 API Key · <a href="#" onclick="openSettings()">点此设置</a>'); return; }
  const story = document.getElementById('storyInput').value.trim();
  if (!story || story.length < 6) { showError('请输入至少 6 个字的故事描述'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('inputCard').style.display = 'none';
  document.getElementById('resultWrap').classList.remove('show');
  document.getElementById('outputArea').innerHTML = '';
  showLoading(true);

  await doAnalyze(story, key);

  btn.disabled = false;
  document.getElementById('inputCard').style.display = 'block';
}

async function doAnalyze(story, key) {
  const sys = `你是剧引AI导演系统——一个世界级的电影/短剧内容评估引擎。

你的角色不是聊天助手。你是一个结构化的内容分析系统，对标好莱坞剧本评估师 + 短剧爆款分析师。

══════ 核心规则 ══════
1. 你必须输出严格JSON格式，字段一个不能少
2. 所有文字必须用中文
3. 评分基于内容结构，不是个人喜好
4. 诊断必须具体到秒/场景级，禁止"节奏有点慢"这种空话
5. 改造方案必须可执行，一个普通人看完能马上动手改

══════ 评估框架 ══════

【评分维度】
- commercial：商业吸引力（0-100）——这个故事在抖音/TikTok上能吸引多少陌生人停下来
- emotional：情绪冲击力（0-100）——观众看完会不会有强烈情绪反应（哭/笑/爽/震撼）
- viral：爆款潜力（0-100）——前3秒抓人程度 + 传播模因强度 + 反转质量

【结论逻辑】
- 三平均 >= 70 → "具备爆款潜力"
- 三平均 50-69 → "需优化后可爆"
- 三平均 < 50 → "暂不具备爆款潜力"

【诊断四维度】
- opening：开场0-5秒有没有钩子？观众凭什么不停下来？
- character：主角有没有清晰欲望+障碍？观众凭什么关心TA？
- conflict：核心冲突是否足够锋利？是"她想赢"还是"她必须赢否则会死"？
- rhythm：节奏有没有"压迫→爆发→再压迫→再爆发"的波浪？还是一根线走到底？

【改造逻辑】
当三平均 < 70 时，你必须给出：
1. 修改后的故事版本——更强欲望、更锋利冲突、更早的反转
2. 结构变化清单——每一条改了什么、为什么这样改
3. 至少3个爆点增强——具体到这个场景/这句台词/这个反转`;

  const usr = `故事：${story}

请按以下JSON输出（每个字段必填，不能省略）：
{
  "scores": {
    "commercial": 数字,
    "emotional": 数字,
    "viral": 数字
  },
  "conclusion": "具备爆款潜力" | "需优化后可爆" | "暂不具备爆款潜力",
  "diagnosis": {
    "opening": "开场问题分析（具体，不要空话）",
    "character": "人物问题分析",
    "conflict": "冲突问题分析",
    "rhythm": "节奏问题分析"
  },
  "improvement": {
    "story": "改造后的故事版本（一段话）",
    "changes": ["结构变化1及原因","结构变化2及原因"],
    "hotspots": ["爆点增强1","爆点增强2","爆点增强3"]
  }
}`;

  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 90000);
    const r = await fetch('https://api.deepseek.com/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: 'deepseek-v4-pro',
        messages: [
          { role: 'system', content: sys },
          { role: 'user', content: usr }
        ],
        max_tokens: 8192,
        temperature: 0.7,
        response_format: { type: 'json_object' }
      }),
      signal: ctrl.signal
    });
    clearTimeout(tid);

    if (!r.ok) {
      const je = await r.json().catch(() => ({}));
      if (r.status === 401) throw new Error('API Key 无效或已过期，<a href="#" onclick="openSettings()">点此重新设置</a>');
      if (r.status === 402) throw new Error('DeepSeek 余额不足，<a href="https://platform.deepseek.com/top_up" target="_blank">点此充值</a>');
      throw new Error(je.error?.message || '请求失败');
    }

    const d = await r.json();
    let ct = d.choices?.[0]?.message?.content;
    if (!ct) throw new Error('AI返回为空');

    let pd;
    try { pd = JSON.parse(ct.replace(/```json|```/g, '').trim()); }
    catch {
      const m = ct.match(/\{[\s\S]*\}/);
      if (m) pd = JSON.parse(m[0]);
      else throw new Error('JSON解析失败');
    }

    pd = sanitize(pd);
    showLoading(false);
    lastResult = pd;
    render(pd);
    saveHistory(pd, story);
    document.getElementById('resultWrap').classList.add('show');
    scrollTo('resultWrap');

  } catch (err) {
    showLoading(false);
    if (err.name === 'AbortError') showError('分析超时，请重试或缩短故事');
    else showError(err.message);
  }
}

// ===== Sanitize =====
function sanitize(d) {
  if (!d.scores) d.scores = { commercial: 50, emotional: 50, viral: 50 };
  d.scores.commercial = clamp(d.scores.commercial || 50, 0, 100);
  d.scores.emotional = clamp(d.scores.emotional || 50, 0, 100);
  d.scores.viral = clamp(d.scores.viral || 50, 0, 100);
  const avg = Math.round((d.scores.commercial + d.scores.emotional + d.scores.viral) / 3);
  d.conclusion = d.conclusion || (avg >= 70 ? '具备爆款潜力' : avg >= 50 ? '需优化后可爆' : '暂不具备爆款潜力');
  if (!d.diagnosis) d.diagnosis = { opening: '', character: '', conflict: '', rhythm: '' };
  if (!d.improvement) d.improvement = { story: '', changes: [], hotspots: [] };
  d.improvement.changes = d.improvement.changes || [];
  d.improvement.hotspots = d.improvement.hotspots || [];
  return d;
}
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

// ===== Render =====
function render(d) {
  const s = d.scores;
  const avg = Math.round((s.commercial + s.emotional + s.viral) / 3);
  const cls = (v) => v >= 70 ? 'high' : v >= 50 ? 'mid' : 'low';
  const cCls = d.conclusion.includes('具备') ? 'yes' : d.conclusion.includes('优化') ? 'maybe' : 'no';

  let html = '';

  // Module 1: Scores
  html += '<div class="score-module"><h2>爆款潜力评估</h2>';
  html += '<div class="score-row">';
  html += scoreItem('商业吸引力', s.commercial, cls(s.commercial));
  html += scoreItem('情绪冲击力', s.emotional, cls(s.emotional));
  html += scoreItem('爆款潜力', s.viral, cls(s.viral));
  html += '</div>';
  html += '<div class="conclusion ' + cCls + '">' + esc(d.conclusion) + ' · 综合 ' + avg + ' 分</div>';
  html += '</div>';

  // Module 2: Diagnosis
  const diag = d.diagnosis;
  if (diag) {
    html += '<div class="diag-module"><h2>为什么可能不爆 · 结构诊断</h2>';
    html += diagItem('开场', diag.opening);
    html += diagItem('人物', diag.character);
    html += diagItem('冲突', diag.conflict);
    html += diagItem('节奏', diag.rhythm);
    html += '</div>';
  }

  // Module 3: Improvement
  const imp = d.improvement;
  if (imp) {
    html += '<div class="fix-module"><h2>如何改成能爆 · 改造方案</h2>';
    if (imp.story) html += '<div class="fix-story">' + esc(imp.story) + '</div>';
    if (imp.changes.length) {
      html += '<div class="fix-changes"><strong>结构变化：</strong><br>';
      imp.changes.forEach(c => { html += '· ' + esc(c) + '<br>'; });
      html += '</div>';
    }
    if (imp.hotspots.length) {
      html += '<div class="fix-points">';
      imp.hotspots.forEach((h, i) => { html += '<div class="fix-point">💥 爆点 ' + (i + 1) + '：' + esc(h) + '</div>'; });
      html += '</div>';
    }
    html += '</div>';
  }

  document.getElementById('outputArea').innerHTML = html;
  scrollTo('outputArea');
}

function scoreItem(label, val, cls) {
  return '<div class="score-item"><div class="score-ring ' + cls + '">' + val + '</div><div class="score-label">' + label + '</div></div>';
}
function diagItem(tag, text) {
  if (!text) return '';
  return '<div class="diag-item"><div class="diag-tag">' + tag + '</div><div class="diag-text">' + esc(text) + '</div></div>';
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ===== History =====
function saveHistory(d, story) {
  let h = []; try { h = JSON.parse(localStorage.getItem(HK) || '[]'); } catch (e) {}
  const avg = Math.round((d.scores.commercial + d.scores.emotional + d.scores.viral) / 3);
  h.unshift({ title: (story || '').slice(0, 50), score: avg, data: d, time: Date.now() });
  if (h.length > 20) h = h.slice(0, 20);
  try { localStorage.setItem(HK, JSON.stringify(h)); } catch (e) {}
  updateHistBadge();
}
function updateHistBadge() {
  let h = []; try { h = JSON.parse(localStorage.getItem(HK) || '[]'); } catch (e) {}
  const b = document.querySelector('.hist-btn');
  if (b) b.textContent = '📜 历史' + (h.length ? ' (' + h.length + ')' : '');
}
function toggleHistory() {
  const p = document.getElementById('historyPanel');
  p.classList.toggle('show');
  if (p.classList.contains('show')) renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyList');
  let h = []; try { h = JSON.parse(localStorage.getItem(HK) || '[]'); } catch (e) {}
  if (!h.length) { el.innerHTML = '<div style="font-size:10px;color:var(--muted);padding:4px 0">暂无历史</div>'; return; }
  el.innerHTML = h.map((e, i) => '<div class="history-item" onclick="loadHistory(' + i + ')"><span class="hi-title">' + esc(e.title || '未命名') + '</span><span class="hi-score">' + e.score + '分</span><span class="hi-del" onclick="event.stopPropagation();delHistory(' + i + ')">✕</span></div>').join('');
}
function loadHistory(i) {
  let h = []; try { h = JSON.parse(localStorage.getItem(HK) || '[]'); } catch (e) {}
  if (!h[i]) return;
  lastResult = h[i].data;
  render(h[i].data);
  document.getElementById('resultWrap').classList.add('show');
  document.getElementById('historyPanel').classList.remove('show');
  scrollTo('outputArea');
}
function delHistory(i) {
  let h = []; try { h = JSON.parse(localStorage.getItem(HK) || '[]'); } catch (e) {}
  h.splice(i, 1); localStorage.setItem(HK, JSON.stringify(h));
  renderHistory(); updateHistBadge();
}

// ===== Reset =====
function resetForm() {
  document.getElementById('resultWrap').classList.remove('show');
  document.getElementById('outputArea').innerHTML = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
